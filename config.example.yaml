# Example config. Copy to config.yaml and edit. Pass with --config config.yaml.

symbols: [AAPL, MSFT, SPY]
strategy: sma_crossover        # sma_crossover | rsi_reversion | momentum | scorecard
strategy_params:
  fast: 20
  slow: 50

# --- Universe scanning (optional) ------------------------------------------
# Instead of `symbols`, point at a broad candidate pool; the agent ranks the
# whole pool each cycle and holds only the top `max_positions` that qualify.
# Preset names: largecap | sp500 | crypto. Or give your own list / CSV string.
# universe: largecap
# max_positions: 5             # hold at most 5 names (defaults to 5 if a universe is set)
# NOTE: free data rate-limits on big scans -- keep universes in the tens-to-low-
# hundreds, or move to a paid/batch feed for "everything".

starting_cash: 10000
commission: 0.0
slippage_bps: 1.0

# broker: paper (default) | alpaca (legal API) | robinhood_mcp (official) | robinhood (legacy/unofficial)
broker: paper
asset_class: equity            # equity | crypto  (crypto => genuine 24/7 on Alpaca)
# Must be true AND you must pass --i-understand-the-risks to place real orders.
allow_live: false

data_source: synthetic         # synthetic | yfinance | csv
lookback_days: 400

# --- Autonomy (used by `trading-agent loop`) -------------------------------
# The loop runs unattended with NO human approval step. Its only gate is the
# automated risk kill switch below.
session: equity                # equity (9:30-16:00 ET) | extended (4-20 ET) | always (crypto/24-7)
interval_seconds: 900          # seconds between decision cycles

# --- News / sentiment tilt (current events, geopolitics, tech, banking) ----
news:
  enabled: false               # true => blend headline sentiment with the technical signal
  provider: stub               # stub (offline) | rss (one-shot) | live (polled feed) | alpaca (push stream)
  weight: 0.3                   # 0..1 blend weight of news vs. technical (keep modest)
  limit: 20                     # headlines scored per symbol
  poll_seconds: 60             # live feed: how often to poll for new headlines
  max_age_seconds: 3600        # live feed: how long a headline stays "fresh"

# --- Fundamentals tilt (company quality: growth, margins, valuation) --------
# A quality filter on top of the technical + news read. Fundamentals move slowly,
# so keep the weight small; it damps trades in deteriorating names and boosts
# healthy ones. "In sync with technicals" = this blend, not magic.
fundamentals:
  enabled: false               # true => blend fundamental quality into the signal
  provider: stub               # stub (offline) | yfinance (free, occasionally flaky)
  weight: 0.2                   # 0..1 blend weight (keep modest)

# --- Risk. Pick a profile OR specify the full `risk:` block below (not both). ---
risk_profile: medium           # low | medium | aggressive  (aggressive = 60% positions!)

# Explicit hard limits (uncomment to override the profile). A strategy can
# never loosen these — they are what keep you at low-to-medium risk.
# risk:
#   max_position_pct: 0.10       # <=10% of equity in any one name
#   risk_per_trade_pct: 0.01     # risk 1% of equity per trade (stop-based sizing)
#   stop_loss_pct: 0.05          # exit a position down 5% from entry
#   take_profit_pct: 0.08        # sell once a position is up 8% (0 = disabled)
#   max_daily_loss_pct: 0.03     # halt new buys after a 3% down day
#   max_drawdown_pct: 0.15       # liquidate everything if 15% below peak equity
#   max_gross_exposure_pct: 0.90 # never more than 90% of equity deployed
#   min_cash_pct: 0.10           # always keep 10% in cash

# Equity-based risk tiers: automatically switch limits as the balance grows.
# Below the first tier, `risk_profile`/`risk` applies. Example: run aggressive
# while tiny, then auto-de-risk to 15% positions once the account reaches $100.
# risk_tiers:
#   - min_equity: 100
#     profile: medium            # start from this profile...
#     max_position_pct: 0.15     # ...then override specific limits
